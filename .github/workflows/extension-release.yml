name: Extension Release

on:
  push:
    tags:
      - "ext-chrome-v*"
      - "ext-safari-v*"

permissions:
  contents: write

jobs:
  release-chrome:
    name: Release Chrome Extension
    if: startsWith(github.ref_name, 'ext-chrome-')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @browserbridge/shared build

      - name: Build Chrome extension
        run: pnpm --filter @browserbridge/chrome-extension build

      - name: Validate manifest
        run: |
          MANIFEST="clients/extensions/chrome/dist/manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::dist/manifest.json not found after build"
            exit 1
          fi
          VERSION=$(node -p "require('$MANIFEST').version")
          TAG_VERSION="${GITHUB_REF_NAME#ext-chrome-v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Manifest version $VERSION does not match tag version $TAG_VERSION"
            exit 1
          fi
          echo "Manifest version: $VERSION"
          echo "Tag version: $TAG_VERSION"

      - name: Verify build output
        run: |
          DIST="clients/extensions/chrome/dist"
          for file in background.js content.js popup-entry.js popup.html manifest.json; do
            if [ ! -f "$DIST/$file" ]; then
              echo "::error::Missing $file in dist/"
              exit 1
            fi
          done
          if [ ! -d "$DIST/icons" ]; then
            echo "::error::Missing icons/ in dist/"
            exit 1
          fi
          echo "All required files present in dist/"

      - name: Create submission ZIP
        run: |
          cd clients/extensions/chrome/dist
          zip -r ../../../browserbridge-chrome-extension.zip .
          cd -
          ls -lh browserbridge-chrome-extension.zip

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#ext-chrome-v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHANGELOG=$(awk "/^## \\[${VERSION}\\]/,/^## \\[/" CHANGELOG.md | head -n -1)
          echo "BODY<<EOFMARKER" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOFMARKER" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Chrome Extension v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.BODY }}
          files: browserbridge-chrome-extension.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}

  release-safari:
    name: Release Safari Extension
    if: startsWith(github.ref_name, 'ext-safari-')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @browserbridge/shared build

      - name: Build Safari extension
        run: pnpm --filter @browserbridge/safari-extension build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#ext-safari-v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Safari Extension v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}