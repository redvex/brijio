name: Tag and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Extract version tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHANGELOG=$(awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" {
              in_section = 1
              print
              next
            }
            in_section && /^## \[/ {
              exit
            }
            in_section {
              print
            }
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG" ]; then
            echo "::error::No changelog section found for $VERSION"
            exit 1
          fi

          {
            echo "BODY<<EOFMARKER"
            echo "$CHANGELOG"
            echo "EOFMARKER"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Brijio v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}

  chrome-extension-asset:
    name: Build Chrome extension asset
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @brijio/shared build

      - name: Build Chrome extension
        run: pnpm --filter @brijio/chrome-extension build

      - name: Validate Chrome manifest version
        run: |
          MANIFEST="clients/extensions/chrome/dist/manifest.json"
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$MANIFEST','utf8')).version)")
          TAG_VERSION="${{ needs.release.outputs.version }}"

          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Chrome manifest version $VERSION does not match tag version $TAG_VERSION"
            exit 1
          fi

      - name: Verify Chrome build output
        run: |
          DIST="clients/extensions/chrome/dist"
          for file in background.js content.js popup-entry.js popup.html manifest.json; do
            if [ ! -f "$DIST/$file" ]; then
              echo "::error::Missing $file in Chrome dist/"
              exit 1
            fi
          done

          if [ ! -d "$DIST/icons" ]; then
            echo "::error::Missing icons/ in Chrome dist/"
            exit 1
          fi

      - name: Create Chrome extension ZIP
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          cd clients/extensions/chrome/dist
          zip -r "${GITHUB_WORKSPACE}/brijio-chrome-extension-${VERSION}.zip" .

      - name: Upload Chrome extension asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: brijio-chrome-extension-${{ needs.release.outputs.version }}.zip

  safari-extension-asset:
    name: Build Safari extension asset
    runs-on: macos-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @brijio/shared build

      - name: Build Safari extension
        run: pnpm --filter @brijio/safari-extension build

      - name: Validate Safari manifest version
        run: |
          MANIFEST="clients/extensions/safari/dist/manifest.json"
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$MANIFEST','utf8')).version)")
          TAG_VERSION="${{ needs.release.outputs.version }}"

          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Safari manifest version $VERSION does not match tag version $TAG_VERSION"
            exit 1
          fi

      - name: Verify Safari converter is available
        run: xcrun --find safari-web-extension-converter

      - name: Convert Safari web extension to Xcode project
        run: |
          xcrun safari-web-extension-converter \
            --force \
            --bundle-identifier uk.co.redvex.Brijio \
            --project-location "${GITHUB_WORKSPACE}/safari-release" \
            clients/extensions/safari/dist

      - name: Create Safari extension ZIP
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          zip -r "brijio-safari-extension-${VERSION}.zip" safari-release

      - name: Upload Safari extension asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: brijio-safari-extension-${{ needs.release.outputs.version }}.zip

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify npm token identity
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is required to publish @brijio/mcp."
            exit 1
          fi

          npm whoami --registry=https://registry.npmjs.org/
          echo "If publish fails with E404, verify this token has publish access to @brijio/mcp and the @brijio scope."

      - name: Verify package version matches tag
        id: package
        working-directory: servers/mcp
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "::error::Tag v${VERSION} does not match servers/mcp package version ${PACKAGE_VERSION}."
            exit 1
          fi

          echo "name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check whether npm version already exists
        id: npm
        run: |
          PACKAGE="${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"

          set +e
          NPM_VIEW_OUTPUT="$(npm view "$PACKAGE" version 2>&1)"
          NPM_VIEW_STATUS=$?
          set -e

          if [ "$NPM_VIEW_STATUS" -eq 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE already exists on npm; skipping publish."
          elif printf '%s\n' "$NPM_VIEW_OUTPUT" | grep -q "E404"; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$NPM_VIEW_OUTPUT"
            echo "::error::Failed to check whether $PACKAGE exists on npm."
            exit "$NPM_VIEW_STATUS"
          fi

      - name: Build npm package
        if: steps.npm.outputs.exists != 'true'
        working-directory: servers/mcp
        run: pnpm build

      - name: Publish npm package
        if: steps.npm.outputs.exists != 'true'
        working-directory: servers/mcp
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: publish-npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: image
        env:
          DOCKER_HUB_USER: ${{ vars.DOCKER_HUB_USER }}
        run: |
          if [ -z "$DOCKER_HUB_USER" ]; then
            echo "::error::DOCKER_HUB_USER repository variable is required."
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="${DOCKER_HUB_USER}/mcp"

          {
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}"
            if [[ "$VERSION" != *-* ]]; then
              echo "${IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
