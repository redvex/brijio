name: Tag and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      should_release: ${{ steps.release_tag.outputs.SHOULD_RELEASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract package version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check whether release tag already exists
        id: release_tag
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          if git ls-remote --exit-code --tags origin "v${VERSION}" >/dev/null 2>&1; then
            echo "SHOULD_RELEASE=false" >> "$GITHUB_OUTPUT"
            echo "Release tag v${VERSION} already exists; skipping release."
            exit 0
          fi

          echo "SHOULD_RELEASE=true" >> "$GITHUB_OUTPUT"

      - name: Build
        if: steps.release_tag.outputs.SHOULD_RELEASE == 'true'
        run: pnpm build

      - name: Test
        if: steps.release_tag.outputs.SHOULD_RELEASE == 'true'
        run: pnpm test

      - name: Extract changelog
        if: steps.release_tag.outputs.SHOULD_RELEASE == 'true'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHANGELOG=$(awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" {
              in_section = 1
              print
              next
            }
            in_section && /^## \[/ {
              exit
            }
            in_section {
              print
            }
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG" ]; then
            echo "::error::No changelog section found for $VERSION"
            exit 1
          fi

          {
            echo "BODY<<EOFMARKER"
            echo "$CHANGELOG"
            echo "EOFMARKER"
          } >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: steps.release_tag.outputs.SHOULD_RELEASE == 'true'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        if: steps.release_tag.outputs.SHOULD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Brijio v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}

  chrome-extension-asset:
    name: Build Chrome extension asset
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @brijio/shared build

      - name: Build Chrome extension
        run: pnpm --filter @brijio/chrome-extension build

      - name: Validate Chrome manifest version
        run: |
          MANIFEST="clients/extensions/chrome/dist/manifest.json"
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$MANIFEST','utf8')).version)")
          TAG_VERSION="${{ needs.release.outputs.version }}"

          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Chrome manifest version $VERSION does not match tag version $TAG_VERSION"
            exit 1
          fi

      - name: Verify Chrome build output
        run: |
          DIST="clients/extensions/chrome/dist"
          for file in background.js content.js popup-entry.js popup.html manifest.json; do
            if [ ! -f "$DIST/$file" ]; then
              echo "::error::Missing $file in Chrome dist/"
              exit 1
            fi
          done

          if [ ! -d "$DIST/icons" ]; then
            echo "::error::Missing icons/ in Chrome dist/"
            exit 1
          fi

      - name: Create Chrome extension ZIP
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          cd clients/extensions/chrome/dist
          zip -r "${GITHUB_WORKSPACE}/brijio-chrome-extension-${VERSION}.zip" .

      - name: Upload Chrome extension asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: brijio-chrome-extension-${{ needs.release.outputs.version }}.zip

  safari-extension-asset:
    name: Build Safari extension asset
    runs-on: macos-latest
    needs: release
    if: needs.release.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @brijio/shared build

      - name: Build Safari extension
        run: pnpm --filter @brijio/safari-extension build

      - name: Validate Safari manifest versions
        run: |
          TAG_VERSION="${{ needs.release.outputs.version }}"

          for MANIFEST in \
            clients/extensions/safari/dist-ios/manifest.json \
            clients/extensions/safari/dist-macos/manifest.json
          do
            VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$MANIFEST','utf8')).version)")

            if [ "$VERSION" != "$TAG_VERSION" ]; then
              echo "::error::Safari manifest $MANIFEST version $VERSION does not match tag version $TAG_VERSION"
              exit 1
            fi
          done

      - name: Create Safari web extension ZIPs
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          cd clients/extensions/safari/dist-ios
          zip -r "${GITHUB_WORKSPACE}/brijio-safari-ios-web-extension-${VERSION}.zip" .
          cd "${GITHUB_WORKSPACE}/clients/extensions/safari/dist-macos"
          zip -r "${GITHUB_WORKSPACE}/brijio-safari-macos-web-extension-${VERSION}.zip" .

      - name: Upload Safari web extension assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: |
            brijio-safari-ios-web-extension-${{ needs.release.outputs.version }}.zip
            brijio-safari-macos-web-extension-${{ needs.release.outputs.version }}.zip

      - name: Convert iOS Safari web extension to Xcode project
        id: convert-safari-ios
        continue-on-error: true
        run: |
          xcrun --find safari-web-extension-converter
          xcrun safari-web-extension-converter \
            --force \
            --ios-only \
            --no-prompt \
            --no-open \
            --copy-resources \
            --bundle-identifier uk.co.redvex.Brijio \
            --project-location "${GITHUB_WORKSPACE}/safari-ios-release" \
            clients/extensions/safari/dist-ios

      - name: Convert macOS Safari web extension to Xcode project
        id: convert-safari-macos
        continue-on-error: true
        run: |
          xcrun --find safari-web-extension-converter
          xcrun safari-web-extension-converter \
            --force \
            --macos-only \
            --no-prompt \
            --no-open \
            --copy-resources \
            --bundle-identifier uk.co.redvex.Brijio \
            --project-location "${GITHUB_WORKSPACE}/safari-macos-release" \
            clients/extensions/safari/dist-macos

      - name: Create iOS Safari Xcode project ZIP
        if: steps.convert-safari-ios.outcome == 'success'
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          zip -r "brijio-safari-ios-xcode-project-${VERSION}.zip" safari-ios-release

      - name: Create macOS Safari Xcode project ZIP
        if: steps.convert-safari-macos.outcome == 'success'
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          zip -r "brijio-safari-macos-xcode-project-${VERSION}.zip" safari-macos-release

      - name: Upload iOS Safari Xcode project asset
        if: steps.convert-safari-ios.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: brijio-safari-ios-xcode-project-${{ needs.release.outputs.version }}.zip

      - name: Upload macOS Safari Xcode project asset
        if: steps.convert-safari-macos.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: brijio-safari-macos-xcode-project-${{ needs.release.outputs.version }}.zip

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package version matches release
        id: package
        working-directory: servers/mcp
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$PACKAGE_NAME" != "@brijio/mcp" ]; then
            echo "::error::Expected publish package @brijio/mcp, got ${PACKAGE_NAME}."
            exit 1
          fi

          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "::error::Release v${VERSION} does not match servers/mcp package version ${PACKAGE_VERSION}."
            exit 1
          fi

          echo "name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check whether npm version already exists
        id: npm
        run: |
          PACKAGE="${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"

          set +e
          NPM_VIEW_OUTPUT="$(npm view "$PACKAGE" version 2>&1)"
          NPM_VIEW_STATUS=$?
          set -e

          if [ "$NPM_VIEW_STATUS" -eq 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE already exists on npm; skipping publish."
          elif printf '%s\n' "$NPM_VIEW_OUTPUT" | grep -q "E404"; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$NPM_VIEW_OUTPUT"
            echo "::error::Failed to check whether $PACKAGE exists on npm."
            exit "$NPM_VIEW_STATUS"
          fi

      - name: Build npm package
        if: steps.npm.outputs.exists != 'true'
        working-directory: servers/mcp
        run: pnpm build

      - name: Publish npm package
        if: steps.npm.outputs.exists != 'true'
        working-directory: servers/mcp
        run: npm publish --access public --provenance --no-git-checks

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs:
      - release
      - publish-npm
    if: needs.release.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: image
        env:
          DOCKER_HUB_USER: ${{ vars.DOCKER_HUB_USER }}
        run: |
          if [ -z "$DOCKER_HUB_USER" ]; then
            echo "::error::DOCKER_HUB_USER repository variable is required."
            exit 1
          fi

          VERSION="${{ needs.release.outputs.version }}"
          IMAGE="${DOCKER_HUB_USER}/mcp"

          {
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}"
            if [[ "$VERSION" != *-* ]]; then
              echo "${IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
