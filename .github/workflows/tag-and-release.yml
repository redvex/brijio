name: Tag and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: changelog
        run: |
          # Extract the changelog section for this version
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Find the section between "## [VERSION]" and the next "## [" header
          CHANGELOG=$(awk "/^## \[${VERSION}\]/,/^## \[/" CHANGELOG.md | head -n -1)
          echo "BODY<<EOFMARKER" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOFMARKER" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: BrowserBridge v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package version matches tag
        id: package
        working-directory: servers/mcp
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "::error::Tag v${VERSION} does not match servers/mcp package version ${PACKAGE_VERSION}."
            exit 1
          fi

          echo "name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check whether npm version already exists
        id: npm
        run: |
          PACKAGE="${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"

          set +e
          NPM_VIEW_OUTPUT="$(npm view "$PACKAGE" version 2>&1)"
          NPM_VIEW_STATUS=$?
          set -e

          if [ "$NPM_VIEW_STATUS" -eq 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE already exists on npm; skipping publish."
          elif printf '%s\n' "$NPM_VIEW_OUTPUT" | grep -q "E404"; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$NPM_VIEW_OUTPUT"
            echo "::error::Failed to check whether $PACKAGE exists on npm."
            exit "$NPM_VIEW_STATUS"
          fi

      - name: Build npm package
        if: steps.npm.outputs.exists != 'true'
        working-directory: servers/mcp
        run: pnpm build

      - name: Publish npm package
        if: steps.npm.outputs.exists != 'true'
        working-directory: servers/mcp
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: publish-npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: image
        env:
          DOCKER_HUB_USER: ${{ vars.DOCKER_HUB_USER }}
        run: |
          if [ -z "$DOCKER_HUB_USER" ]; then
            echo "::error::DOCKER_HUB_USER repository variable is required."
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="${DOCKER_HUB_USER}/browserbridge"

          {
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}"
            if [[ "$VERSION" != *-* ]]; then
              echo "${IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
