name: Publish demo pages

on:
  push:
    branches:
      - develop
    paths:
      - "clients/test-page/**"
      - "clients/extensions/chrome/PRIVACY-POLICY.md"
      - "docs/artifacts/download-and-install.md"
      - "docs/artifacts/faq.md"
      - "scripts/build-pages-site.mjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy demo pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble Pages artifact
        run: node scripts/build-pages-site.mjs .pages-site

      - name: Upload demo pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
