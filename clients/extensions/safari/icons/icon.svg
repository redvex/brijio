<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>
  <!-- Bridge icon: two nodes connected by a line -->
  <g transform="translate(256,256)">
    <!-- Left node (browser) -->
    <circle cx="-100" cy="0" r="60" fill="none" stroke="#4ecca3" stroke-width="8"/>
    <rect x="-130" y="-20" width="60" height="40" rx="4" fill="none" stroke="#4ecca3" stroke-width="6"/>
    <!-- Right node (AI) -->
    <circle cx="100" cy="0" r="60" fill="none" stroke="#e74c3c" stroke-width="8"/>
    <text x="100" y="10" text-anchor="middle" fill="#e74c3c" font-family="system-ui,sans-serif" font-size="48" font-weight="700">AI</text>
    <!-- Connection line -->
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#9aa0a6" stroke-width="6"/>
    <!-- Connection dots -->
    <circle cx="-40" cy="0" r="8" fill="#4ecca3"/>
    <circle cx="40" cy="0" r="8" fill="#e74c3c"/>
  </g>
</svg>