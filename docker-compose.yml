services:
  websocket:
    build:
      context: .
      dockerfile: servers/websocket/Dockerfile
    environment:
      WEBSOCKET_HOST: 0.0.0.0
      WEBSOCKET_PORT: 8787
    ports:
      - "${WEBSOCKET_PORT:-8787}:8787"
    profiles:
      - runtime

  mcp:
    build:
      context: .
      dockerfile: servers/mcp/Dockerfile
    environment:
      BROWSERBRIDGE_WEBSOCKET_URL: ws://websocket:8787
      BROWSERBRIDGE_REQUEST_TIMEOUT_MS: ${BROWSERBRIDGE_REQUEST_TIMEOUT_MS:-5000}
      BROWSERBRIDGE_TOKEN: ${BROWSERBRIDGE_TOKEN:-local-dev-token}
      MCP_SESSION_ID: ${MCP_SESSION_ID:-local}
    depends_on:
      - websocket
    profiles:
      - runtime

  test-page:
    image: nginx:1.27-alpine
    ports:
      - "${TEST_PAGE_PORT:-8080}:80"
    volumes:
      - ./test.html:/usr/share/nginx/html/test.html:ro
    profiles:
      - runtime
