services:
  browserbridge:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      WEBSOCKET_HOST: 0.0.0.0
      WEBSOCKET_PORT: 8787
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 8788
      MCP_HTTP_PATH: /mcp
      BROWSERBRIDGE_PAIRING_TOKEN: ${BROWSERBRIDGE_PAIRING_TOKEN:-}
      MCP_HTTP_AUTH_TOKEN: ${MCP_HTTP_AUTH_TOKEN:-}
      BROWSERBRIDGE_REQUEST_TIMEOUT_MS: ${BROWSERBRIDGE_REQUEST_TIMEOUT_MS:-5000}
    ports:
      - "${WEBSOCKET_PORT:-8787}:8787"
      - "${MCP_HTTP_PORT:-8788}:8788"
    profiles:
      - runtime

  test-page:
    image: nginx:1.27-alpine
    ports:
      - "${TEST_PAGE_PORT:-8080}:80"
    volumes:
      - ./clients/test-page:/usr/share/nginx/html:ro
    profiles:
      - test